<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xbox Главная</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <img src="/img/xbox.png" alt="logo">
            <ul>
                <li><a href="#">Games</a></li>
                <li><a href="#">Consoles</a></li>
                <li><a href="#">Community</a></li>
            </ul>
            <div class="search">
                <input type="text" placeholder="Search">
            </div>
            <div class="my-xbox">My Xbox</div>
        </nav>
    </header>
    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Star Wars <br> Battlefront II</h1>
                <div class="hero-buttons">
                    <button>Watch Trailer</button>
                    <button>Explore Games</button>
                </div>
            </div>
        </section>

        <section class="value-section">
            <div class="value-title">
                <img src="/img/xbox icon.png" alt="icon">
                <h2>The best value</h2>
                <h2>in games and entertainment</h2>
            </div>
            <div class="cards">
                <div class="card">
                    <img src="/img/xbox-one-x.png" alt="Xbox One X">
                    <h3>Xbox One X</h3>
                    <p>Faster Processing</p>
                    <p>Smoother Gameplay</p>
                    <button>Explore Consoles & Accessories</button>
                </div>
                <div class="card">
                    <img src="/img/Group 3.png" alt="">
                    <h3>Mixer Streaming</h3>
                    <p>Next Generation</p>
                    <p>Of Live Game Streaming</p>
                    <button>Start Watching Mixer</button>
                </div>
                <div class="card gold">
                    <img src="/img/Group 4.png" alt="">
                    <p>Free Games Every Month</p>
                    <p>Get up to $70 in</p>
                    <p>free games</p>
                    <button>Get Free Games</button>
                </div>
            </div>
        </section>
    </main>
